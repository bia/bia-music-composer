<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bia Music Composer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0d0f;
    --surface:   #161619;
    --border:    #2a2a30;
    --accent:    #8b5cf6;
    --accent-hi: #a78bfa;
    --text:      #f2f2f7;
    --muted:     #9898aa;
    --success:   #34d399;
    --error:     #f87171;
    --warn:      #fbbf24;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── Layout ── */
  .app { max-width: 720px; margin: 0 auto; padding: 32px 20px 80px; }

  header { margin-bottom: 36px; }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
  header p  { color: var(--muted); margin-top: 4px; font-size: 13px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* ── Drop zone ── */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(139,92,246,.06);
  }
  .drop-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .drop-icon { font-size: 28px; margin-bottom: 8px; }
  .drop-label { color: var(--muted); font-size: 13px; }
  .drop-label span { color: var(--accent-hi); }

  .file-chosen {
    display: flex; align-items: center; gap: 10px;
    margin-top: 12px; padding: 10px 14px;
    background: rgba(139,92,246,.1); border-radius: 8px;
    font-size: 13px;
  }
  .file-chosen .dot { width:8px; height:8px; border-radius:50%; background: var(--success); flex-shrink:0; }
  .file-chosen .name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-chosen .clear-file { cursor:pointer; color:var(--muted); font-size:16px; line-height:1; }
  .file-chosen .clear-file:hover { color: var(--error); }

  /* ── Tags ── */
  .tags-wrap {
    display: flex; flex-wrap: wrap; gap: 7px;
    min-height: 38px; align-items: flex-start;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(139,92,246,.15); border: 1px solid rgba(139,92,246,.35);
    border-radius: 20px; padding: 3px 10px 3px 12px;
    font-size: 12px; color: var(--accent-hi); white-space: nowrap;
  }
  .chip .rm { cursor: pointer; opacity: .6; font-size: 13px; }
  .chip .rm:hover { opacity: 1; color: var(--error); }
  .tag-input-wrap { display: flex; gap: 8px; margin-top: 10px; }
  .tag-input {
    flex: 1;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); font-size: 13px; padding: 9px 12px;
    outline: none; transition: border-color 0.15s;
  }
  .tag-input:focus { border-color: var(--accent); }
  .tag-input::placeholder { color: var(--muted); }
  .btn-sm {
    background: rgba(139,92,246,.15); border: 1px solid rgba(139,92,246,.35);
    color: var(--accent-hi); border-radius: 8px; padding: 8px 14px;
    font-size: 12px; cursor: pointer; white-space: nowrap; transition: background 0.15s;
  }
  .btn-sm:hover { background: rgba(139,92,246,.3); }

  /* ── Settings ── */
  details summary {
    list-style: none; cursor: pointer;
    font-size: 12px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted);
    user-select: none;
  }
  details summary::before { content: "▶ "; font-size: 9px; }
  details[open] summary::before { content: "▼ "; }
  .settings-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 16px; margin-top: 16px;
  }
  @media (max-width: 500px) { .settings-grid { grid-template-columns: 1fr 1fr; } }
  .setting label {
    display: block; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px;
  }
  .setting input[type=number], .setting select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text); font-size: 13px;
    padding: 7px 10px; outline: none;
  }
  .setting input[type=number]:focus { border-color: var(--accent); }
  .setting .range-row { display: flex; align-items: center; gap: 8px; }
  .setting input[type=range] {
    flex: 1; accent-color: var(--accent); cursor: pointer;
  }
  .setting .range-val {
    min-width: 32px; text-align: right; font-size: 13px;
    color: var(--accent-hi); font-variant-numeric: tabular-nums;
  }

  /* ── Generate button ── */
  .btn-generate {
    width: 100%; padding: 14px;
    background: var(--accent); border: none; border-radius: 10px;
    color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.15s, opacity 0.15s;
    margin-bottom: 14px;
  }
  .btn-generate:hover:not(:disabled) { background: var(--accent-hi); }
  .btn-generate:disabled { opacity: .4; cursor: not-allowed; }

  /* ── Status ── */
  #status-card { display: none; }
  .status-row { display: flex; align-items: flex-start; gap: 12px; }
  .spinner {
    width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; margin-top: 1px;
    border: 2px solid rgba(139,92,246,.25);
    border-top-color: var(--accent);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-msg { flex: 1; font-size: 13px; }
  .status-msg .primary { font-weight: 500; }
  .status-msg .secondary { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .status-error { color: var(--error); }
  .status-success { color: var(--success); }

  /* ── Outputs ── */
  #outputs-card { display: none; }
  .output-item {
    border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 16px; margin-bottom: 10px; background: var(--bg);
  }
  .output-item:last-child { margin-bottom: 0; }
  .output-name {
    font-size: 12px; color: var(--muted); margin-bottom: 10px;
    font-family: "SF Mono", "Fira Code", monospace;
  }
  audio {
    width: 100%; height: 36px; border-radius: 6px;
    accent-color: var(--accent);
  }
  audio::-webkit-media-controls-panel { background: #1a1a22; }
  .output-actions { margin-top: 10px; display: flex; gap: 8px; }

  /* ── Reset ── */
  .reset-row { text-align: center; margin-top: 10px; }
  .btn-reset {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted); padding: 8px 20px; font-size: 12px; cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent-hi); }

  /* ── GCS path display ── */
  .gcs-path {
    font-family: "SF Mono", "Fira Code", monospace; font-size: 11px;
    color: var(--muted); word-break: break-all; margin-top: 6px;
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>Bia Music Composer</h1>
    <p>Upload a reference track, add tags, and generate new music on GCP.</p>
  </header>

  <!-- ── Input audio ── -->
  <div class="card">
    <div class="card-title">Input Audio</div>
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="audio-input" accept=".wav,audio/wav,audio/*">
      <div class="drop-icon">🎵</div>
      <div class="drop-label">Drop a WAV file here or <span>browse</span></div>
    </div>
    <div class="file-chosen" id="file-chosen" style="display:none">
      <div class="dot"></div>
      <div class="name" id="file-name"></div>
      <div class="clear-file" id="clear-file" title="Remove">✕</div>
    </div>
  </div>

  <!-- ── Tags ── -->
  <div class="card">
    <div class="card-title">Style Tags</div>
    <div class="tags-wrap" id="tags-wrap"></div>
    <div class="tag-input-wrap">
      <input
        class="tag-input" id="tag-input"
        placeholder="Type a tag and press Enter (e.g. piano, ambient, bossa nova…)"
        autocomplete="off"
      >
      <button class="btn-sm" id="add-tag-btn">Add</button>
    </div>
  </div>

  <!-- ── Settings ── -->
  <div class="card">
    <details>
      <summary>Advanced Settings</summary>
      <div class="settings-grid">
        <div class="setting">
          <label for="num-outputs">Outputs</label>
          <input type="number" id="num-outputs" value="3" min="1" max="10">
        </div>
        <div class="setting">
          <label>Temperature</label>
          <div class="range-row">
            <input type="range" id="temperature" min="0.5" max="2.0" step="0.05" value="1.0">
            <span class="range-val" id="temperature-val">1.0</span>
          </div>
        </div>
        <div class="setting">
          <label>CFG Scale</label>
          <div class="range-row">
            <input type="range" id="cfg-scale" min="1.0" max="10.0" step="0.5" value="3.0">
            <span class="range-val" id="cfg-scale-val">3.0</span>
          </div>
        </div>
      </div>
    </details>
  </div>

  <!-- ── Generate ── -->
  <button class="btn-generate" id="generate-btn" disabled>
    Upload &amp; Generate
  </button>

  <!-- ── Status ── -->
  <div class="card" id="status-card">
    <div class="status-row">
      <div class="spinner" id="spinner"></div>
      <div class="status-msg">
        <div class="primary" id="status-primary"></div>
        <div class="secondary" id="status-secondary"></div>
      </div>
    </div>
  </div>

  <!-- ── Outputs ── -->
  <div class="card" id="outputs-card">
    <div class="card-title">Generated Outputs</div>
    <div id="output-list"></div>
    <div class="reset-row">
      <button class="btn-reset" id="reset-btn">Start New Generation</button>
    </div>
  </div>

</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let selectedFile = null;
let tags = [];
let pollTimer = null;
let elapsedTimer = null;
let elapsedSeconds = 0;
let knownOutputs = new Set();

// ── DOM refs ─────────────────────────────────────────────────────────────────
const dropZone     = document.getElementById('drop-zone');
const audioInput   = document.getElementById('audio-input');
const fileChosen   = document.getElementById('file-chosen');
const fileName     = document.getElementById('file-name');
const clearFile    = document.getElementById('clear-file');
const tagsWrap     = document.getElementById('tags-wrap');
const tagInput     = document.getElementById('tag-input');
const addTagBtn    = document.getElementById('add-tag-btn');
const numOutputs   = document.getElementById('num-outputs');
const temperature  = document.getElementById('temperature');
const tempVal      = document.getElementById('temperature-val');
const cfgScale     = document.getElementById('cfg-scale');
const cfgVal       = document.getElementById('cfg-scale-val');
const generateBtn  = document.getElementById('generate-btn');
const statusCard   = document.getElementById('status-card');
const spinner      = document.getElementById('spinner');
const statusPrimary   = document.getElementById('status-primary');
const statusSecondary = document.getElementById('status-secondary');
const outputsCard  = document.getElementById('outputs-card');
const outputList   = document.getElementById('output-list');
const resetBtn     = document.getElementById('reset-btn');

// ── File handling ─────────────────────────────────────────────────────────────
function setFile(file) {
  if (!file) return;
  selectedFile = file;
  fileName.textContent = file.name;
  fileChosen.style.display = 'flex';
  dropZone.querySelector('.drop-icon').style.display = 'none';
  dropZone.querySelector('.drop-label').style.display = 'none';
  updateGenerateBtn();
}

audioInput.addEventListener('change', () => {
  if (audioInput.files[0]) setFile(audioInput.files[0]);
});

clearFile.addEventListener('click', (e) => {
  e.stopPropagation();
  selectedFile = null;
  audioInput.value = '';
  fileChosen.style.display = 'none';
  dropZone.querySelector('.drop-icon').style.display = '';
  dropZone.querySelector('.drop-label').style.display = '';
  updateGenerateBtn();
});

dropZone.addEventListener('dragover', (e) => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', (e) => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) setFile(file);
});

// ── Tags ──────────────────────────────────────────────────────────────────────
function renderTags() {
  tagsWrap.innerHTML = '';
  tags.forEach((tag, i) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.innerHTML = `${tag} <span class="rm" data-i="${i}" title="Remove">✕</span>`;
    tagsWrap.appendChild(chip);
  });
  tagsWrap.querySelectorAll('.rm').forEach(btn => {
    btn.addEventListener('click', () => {
      tags.splice(+btn.dataset.i, 1);
      renderTags();
    });
  });
}

function addTag(raw) {
  // Support comma-separated paste
  raw.split(',').map(t => t.trim().toLowerCase()).filter(Boolean).forEach(t => {
    if (!tags.includes(t)) tags.push(t);
  });
  renderTags();
}

addTagBtn.addEventListener('click', () => {
  addTag(tagInput.value);
  tagInput.value = '';
  tagInput.focus();
});

tagInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ',') {
    e.preventDefault();
    addTag(tagInput.value);
    tagInput.value = '';
  }
  if (e.key === 'Backspace' && tagInput.value === '' && tags.length) {
    tags.pop();
    renderTags();
  }
});

// ── Settings ──────────────────────────────────────────────────────────────────
temperature.addEventListener('input', () => tempVal.textContent = (+temperature.value).toFixed(2));
cfgScale.addEventListener('input',   () => cfgVal.textContent  = (+cfgScale.value).toFixed(1));

// ── Generate button state ─────────────────────────────────────────────────────
function updateGenerateBtn() {
  generateBtn.disabled = !selectedFile;
}

// ── Status helpers ────────────────────────────────────────────────────────────
function showStatus(primary, secondary = '', { error = false, success = false, spin = true } = {}) {
  statusCard.style.display = 'block';
  statusPrimary.textContent = primary;
  statusPrimary.className = 'primary' + (error ? ' status-error' : success ? ' status-success' : '');
  statusSecondary.textContent = secondary;
  spinner.style.display = spin ? 'block' : 'none';
}

function formatElapsed(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m > 0 ? `${m}m ${sec}s elapsed` : `${sec}s elapsed`;
}

function startElapsed() {
  elapsedSeconds = 0;
  clearInterval(elapsedTimer);
  elapsedTimer = setInterval(() => {
    elapsedSeconds++;
    const msg = statusPrimary.textContent;
    statusSecondary.textContent = formatElapsed(elapsedSeconds);
  }, 1000);
}

function stopElapsed() {
  clearInterval(elapsedTimer);
  elapsedTimer = null;
}

// ── Output rendering ──────────────────────────────────────────────────────────
function renderOutputs(blobNames) {
  const newOnes = blobNames.filter(n => !knownOutputs.has(n));
  newOnes.forEach(blobName => {
    knownOutputs.add(blobName);
    const shortName = blobName.split('/').pop();
    const url = `/api/output/${blobName}`;
    const dlUrl = `/api/output/${blobName}?dl=1`;

    const item = document.createElement('div');
    item.className = 'output-item';
    item.innerHTML = `
      <div class="output-name">${shortName}</div>
      <audio controls preload="metadata" src="${url}"></audio>
      <div class="output-actions">
        <a class="btn-sm" href="${dlUrl}" download="${shortName}">⬇ Download</a>
      </div>
    `;
    outputList.appendChild(item);
  });

  if (blobNames.length > 0) {
    outputsCard.style.display = 'block';
  }
}

// ── Polling ───────────────────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();

    switch (data.status) {
      case 'uploading':
        showStatus('Uploading to GCS…', '', { spin: true });
        break;
      case 'uploaded':
        showStatus('Uploaded. Triggering generation…', '', { spin: true });
        break;
      case 'launching':
        showStatus('Launching GCP SPOT VM…', formatElapsed(elapsedSeconds), { spin: true });
        break;
      case 'generating':
        showStatus(data.message, formatElapsed(elapsedSeconds), { spin: true });
        break;
      case 'complete':
        stopPolling();
        stopElapsed();
        showStatus(data.message, '', { success: true, spin: false });
        renderOutputs(data.outputs || []);
        generateBtn.disabled = false;
        generateBtn.textContent = 'Upload & Generate';
        break;
      case 'error':
        stopPolling();
        stopElapsed();
        showStatus('Generation failed', data.error || data.message, { error: true, spin: false });
        generateBtn.disabled = false;
        generateBtn.textContent = 'Upload & Generate';
        break;
    }

    // Also render any partial outputs that have already arrived
    if (data.status === 'generating' && data.outputs && data.outputs.length) {
      renderOutputs(data.outputs);
    }

  } catch (err) {
    // Network hiccup — keep polling
  }
}

function startPolling() {
  stopPolling();
  pollStatus(); // immediate first check
  pollTimer = setInterval(pollStatus, 15_000);
}

function stopPolling() {
  clearInterval(pollTimer);
  pollTimer = null;
}

// ── Generate flow ─────────────────────────────────────────────────────────────
generateBtn.addEventListener('click', async () => {
  if (!selectedFile) return;

  generateBtn.disabled = true;
  generateBtn.textContent = 'Uploading…';
  statusCard.style.display = 'block';
  outputsCard.style.display = 'none';
  outputList.innerHTML = '';
  knownOutputs = new Set();
  showStatus('Uploading audio and tags to GCS…', '', { spin: true });
  startElapsed();

  try {
    // Step 1: upload
    const fd1 = new FormData();
    fd1.append('audio', selectedFile);
    fd1.append('tags', tags.join(','));
    const upRes = await fetch('/api/upload', { method: 'POST', body: fd1 });
    if (!upRes.ok) {
      const err = await upRes.text();
      throw new Error(`Upload failed: ${err}`);
    }

    generateBtn.textContent = 'Launching VM…';
    showStatus('Uploaded. Launching GCP SPOT VM…', formatElapsed(elapsedSeconds), { spin: true });

    // Step 2: trigger generation
    const fd2 = new FormData();
    fd2.append('num_outputs', numOutputs.value);
    fd2.append('temperature', temperature.value);
    fd2.append('cfg_scale', cfgScale.value);
    const genRes = await fetch('/api/generate', { method: 'POST', body: fd2 });
    if (!genRes.ok) {
      const err = await genRes.text();
      throw new Error(`Generate trigger failed: ${err}`);
    }

    generateBtn.textContent = 'Generating…';
    showStatus('GCP VM is starting up…', formatElapsed(elapsedSeconds), { spin: true });
    startPolling();

  } catch (err) {
    stopElapsed();
    showStatus('Error', err.message, { error: true, spin: false });
    generateBtn.disabled = false;
    generateBtn.textContent = 'Upload & Generate';
  }
});

// ── Reset ─────────────────────────────────────────────────────────────────────
resetBtn.addEventListener('click', async () => {
  stopPolling();
  stopElapsed();
  await fetch('/api/reset', { method: 'POST' });

  selectedFile = null;
  audioInput.value = '';
  tags = [];
  renderTags();
  fileChosen.style.display = 'none';
  dropZone.querySelector('.drop-icon').style.display = '';
  dropZone.querySelector('.drop-label').style.display = '';
  statusCard.style.display = 'none';
  outputsCard.style.display = 'none';
  outputList.innerHTML = '';
  knownOutputs = new Set();
  generateBtn.disabled = true;
  generateBtn.textContent = 'Upload & Generate';
});

// ── Init — restore state if server already has a result ──────────────────────
updateGenerateBtn();

(async () => {
  try {
    const res = await fetch('/api/status');
    const data = await res.json();
    if (data.status === 'complete' && data.outputs && data.outputs.length) {
      showStatus(data.message, '', { success: true, spin: false });
      renderOutputs(data.outputs);
    } else if (data.status === 'generating' || data.status === 'launching') {
      elapsedSeconds = data.started_at
        ? Math.floor((Date.now() - new Date(data.started_at).getTime()) / 1000)
        : 0;
      showStatus(data.message, formatElapsed(elapsedSeconds), { spin: true });
      generateBtn.disabled = true;
      generateBtn.textContent = 'Generating…';
      startElapsed();
      startPolling();
    }
  } catch (_) {}
})();
</script>
</body>
</html>
